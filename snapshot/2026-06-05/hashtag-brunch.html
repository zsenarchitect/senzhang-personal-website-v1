  <h3 style="white-space:pre-wrap;">abstract:<h3.html><p class="" style="white-space:pre-wrap;">[Commercial music started, women’s voice, “blueberry, a phone you can trust”, commercial music faded away, a high pitched male voice come in.]<p.html><p class="" style="white-space:pre-wrap;">“It is 11:35 in the morning at FM 110.1. And welcome back to the second half hour of ‘air story’. I am your host John Flash. Our record studio is still flying over the city so make sure to check out the sky and you might see us visiting your district today. For those just tuned in, today we are lucky to have our special guest: Grand Marshal Mr. Benedict Sanders, who has been sharing the recent development of the east town in the previous half hour. Our show was interrupted by an urgent call asking his attention, and now we are back on air. Mr. Sanders, you look awfully sweaty, what was the sitch?”<p.html><p class="" style="white-space:pre-wrap;">“It was my secretary and I have some terrible news, just now I was informed that there was an accident in the east town construction yard. Someone just felt into the mixer truck.”<p.html><p class="" style="white-space:pre-wrap;">“Jeez! Really? &nbsp;The Mega Pancake Project? We were just talking about that in the last period of our show. Is that person ok?”<p.html>

  <p class="" style="white-space:pre-wrap;">“I don't know as much as you might think right now. She was hospitalized and&nbsp;the construction is on hold now, again. I think this is the second construction accident this month. But anyway, this really put us behind schedule this time, I am beginning to concern that how we might deliver the hashtag show this year.”<p.html><p class="" style="white-space:pre-wrap;">“Our balloon’s course is heading to that direction right now, we could have a better look of the site when we get there. This year is full of surprises for the show you are planning I see.”<p.html><p class="" style="white-space:pre-wrap;">“Indeed. That Mega Pancake project had so many soft spots that is tacky to construct. The headache has kept us busy in the last couple of months, many labors involved. However, Johnny, I need to be honest that this annual event is less and less profitable each year. &nbsp;Like everything else, you need to pay to get paid. The equipment setup is already pretty costly for the city budget. Financial issue aside, those curator are moving their attention away from our show. You remember that lady we invited last year?”<p.html><p class="" style="white-space:pre-wrap;">“Lady Sugar Brown? She made Sunnyside Park last year, and strawberry hotels the year before. Those small projects are some good additions to our city.”<p.html>

  <p class="" style="white-space:pre-wrap;">“Well, Well. No more. She was tagged to do curation in hashtag fitness city this year. That is why we urgently need someone with fresh ideas, new plate concept and interesting dishes this year. We had been dropping our position in the trendy board for a while. Hashtag Brunch is no longer top 10. With population of 21.6Million, we cannot let people starve. But this is going to change. We are planning something big to turn things around.”<p.html><p class="" style="white-space:pre-wrap;">“How delightful! Mind if you share that with us?”<p.html><p class="" style="white-space:pre-wrap;">“Popularity come from tagged together. If I can find a good sister town to be tagged at the same time, we might be able to boost it up. That is what happened to hashtag Love city. For many seasons it has been the hottest city, I guess the subject is easily overheated. But anyhow, they are never tagged along, and has been a regular winner of the award because of so. If we can take a ride with the trendy power, we will have more heart shipped in everyday and no one will starve.”<p.html><p class="" style="white-space:pre-wrap;">“That is exciting! Just to think about the new investment we could get with that amount of attention. I often think about how we can improve the general level of&nbsp;publication department. I need to take a good photo and.... Look at where we are now, I see the mega pancake, it is almost finished and just how gorgeous that looks. I see the emergency truck parked over there and everything is under control. &nbsp;And that must be the person eating food mixer. Despite the incident this morning, everything is perfectly misplaced, nicely done. It is a careful organization of seemingly random choose. &nbsp;<p.html><p class="" style="white-space:pre-wrap;">“We hide order in the chaos, yes.”<p.html>

<div.html><div.html><div class="sqs-block html-block sqs-block-html" data-block-type="2" data-sqsp-block="text" id="block-yui_3_17_2_1_1575333465960_48961"><div class="sqs-block-content">

<div class="sqs-html-content" data-sqsp-text-block-content>
  <p class="" style="white-space:pre-wrap;">”I don't know, though…. that pancake image looks a little flat. Oh wait a sec, wasn’t there a plan to build a new filter doom over the city? Haven't heard about it for a while. What happened?”<p.html><p class="" style="white-space:pre-wrap;">“Aaaa that was a heartbreaking decision. You see, our department was debating how to spend our limited funds early this year, either the doom of filter or some expansion to our table land. And most votes went for the newer and bigger project. So doom funds were pulled and filter was suspended. I personally would have gone for the filter. Filter is everything now for the hashtag award. Our assessment tell that things are as good as how it looks. That is the golden principle. Once setup, it can tone all the table food assembly into eyecandys.”<p.html><p class="" style="white-space:pre-wrap;">“The old filter on those colorful rainbow was a hit I recall.”<p.html><p class="" style="white-space:pre-wrap;">“Precisely, and since February we have a new milky tower next to that rainbow pool district. I heard residence cheering and told me they haven't been this happy since they catch the Cereal killer. Yet, I don’t know how long we can keep them happy, after all the effort, people are still starving….”<p.html><p class="" style="white-space:pre-wrap;">“SORRY to interrupt you Grand Marshal, I think we are receiving some information from the studio producer. What is that?….. Ok, our producer just told me the updates on the injured girl, she is fine, just accidentally consumed some syrup. And she is being well treated right now and want to call in our hotlines, let’s listen. Hi, Miss Spoon, we heard about the accident and we all are concerned about your health, how are you feeling right now?”<p.html>

<div class="sqs-html-content" data-sqsp-text-block-content>
  <p class="" style="white-space:pre-wrap;">“Morning Johnny, I have been trying to call you since the accident. I just realized something crazy when I felt into the jar and forcefully consume some syrup. Those construction material, are edible! Are all the other construction materials we are using edible as well? We have so much of them lying all over the places. I think the ending to our citywide hunger would be a piece of cake: why don't we just eat them to sustain our lives instead of craving for the likes and heart to survive? “<p.html><p class="" style="white-space:pre-wrap;">“Oh Dear My Dear! I think your common sense is all jammed up from that mixer. Do you still remember the story of our city founder Captain Ludwig? He was the camera operator back in the day when photo sharing was a newborn technology. His job was to screen show the camera photos to the tourists. He was such a warmhearted man and would pointed out the empty seats next to him and invited the newcomers to fill them in. You can smell the magic in the air anticipated by the crowd as the lights were dimmed; then he started swiping right. ‘Please take photos of my photos.’ he announced. When the slideshow is over, his food in the photos booth were ever locked, promised never to be touched again. Long in the shadow a young women stand up and admired ’Amazing, you must be a great cook!’ &nbsp;He felt much offended with that question, shoot her with a disgusted eyebrow, saying ‘I am an artist, I don't deal with that greasy kitchen.’ That is how I think right now and that is the end of this conversation, let’s never talk about it again.”<p.html>
