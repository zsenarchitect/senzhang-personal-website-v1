  <p><strong>abstract:<strong.html><p.html><p>In the original design of the old forum, the city piazza and interior space are separated by a flat glass wall. Our team reconsidered the facade as a thick folded oppuciable programs zone that can bridges the city piazza and the back-house of the forum, where art gallery, education center, cinema and fine art studio will be located under a ceiling that varies in height. Sloped circulation are embedded with the sloped program, where the visitors can enjoy the great view of both interior and exterior.&nbsp;<p.html><p>Studio: Mark Mistur, Eric Churchill.<p.html><p>Rensselaer Polytechnic Institute, Spring 2015, 4th year<br />Partner: Kun Zhang<p.html>

<div.html><div.html><div class="sqs-block html-block sqs-block-html" data-block-type="2" data-sqsp-block="text" id="block-yui_3_17_2_10_1497214415719_38870"><div class="sqs-block-content">

<div class="sqs-html-content" data-sqsp-text-block-content>
  <p><strong>Unique Levels. Unique Lives.<strong.html><p.html><p>The back-house has less dramatic floor level changes, yet, they are not same in clear height. Either it is a hanging cinema box or a double height gallery space, each floor has a unique experience that goes along with the program setup.<p.html><p>Despite its massive rectangular impression section, the side of the culture center is cladded with channel glass that is blurry translucent. Even when close to the surrounding site buildings, it does not block the view, but actually provides an interactive facade live show of the interior, informing the gallery, the cinema and studio performance to the city at night.<p.html><p><strong>Facade With Depth<strong.html><p.html><p>The facade uses channel glass to introduce as much natural day light as possible. At the night the translucent facade broadcast information to the city, as well as people’s circulation action behind the glass. In certain area the translucent glass is replaced by the clear glass for additional interaction between the city and the culture center.<p.html>
