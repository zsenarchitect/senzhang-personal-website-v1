<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Dashboard - Sen Zhang</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #111; background: #fafafa; }
    body { margin: 0; padding: 24px; max-width: 1200px; margin-inline: auto; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 4px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 20px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
    button, select, input[type="search"] { font: inherit; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
    #status { font-size: 13px; color: #444; min-height: 1.2em; }
    #status.saving { color: #666; }
    #status.saved { color: #0a7; }
    #status.error { color: #b00; }
    .hint { font-size: 12px; color: #888; margin: -8px 0 12px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    th { background: #f3f3f3; font-weight: 600; position: sticky; top: 0; }
    tr.hidden-row { opacity: 0.45; }
    tr.drag-over { outline: 2px solid #111; outline-offset: -2px; }
    tr.dragging { opacity: 0.35; }
    .slug { font-family: ui-monospace, monospace; font-size: 12px; color: #555; }
    .chk { text-align: center; }
    .drag-cell { width: 36px; padding: 6px 4px; text-align: center; }
    .drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      color: #999;
      cursor: grab;
      user-select: none;
      border-radius: 3px;
    }
    .drag-handle:hover { color: #333; background: #f0f0f0; }
    .drag-handle.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
    .thumb-cell { width: 72px; padding: 6px 8px; }
    .thumb-link { display: block; line-height: 0; }
    .thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 2px; background: #eee; display: block; }
    .thumb-missing { width: 56px; height: 56px; border-radius: 2px; background: #ececec; display: block; }
    a { color: #06c; }
  </style>
</head>
<body>
  <h1>Portfolio Project Dashboard</h1>
  <p class="sub">Local dev only. Changes auto-save to <code>data/projects.json</code> and rebuild section grids. Refresh section pages to preview.</p>
  <div class="toolbar">
    <input type="search" id="filter" placeholder="Filter by title or slug..." />
    <select id="catFilter">
      <option value="">All categories</option>
      <option value="academic">Academic</option>
      <option value="professional">Professional</option>
      <option value="code">Code</option>
      <option value="speaking">Speaking</option>
    </select>
    <button type="button" id="reloadBtn">Reload</button>
    <a href="/import-picker">Import picker</a>
    &middot;
    <a href="/menu">Back to site</a>
  </div>
  <p class="hint" id="dragHint">Select a category (and clear search) to drag-sort rows.</p>
  <div id="status"></div>
  <table>
    <thead>
      <tr>
        <th class="drag-cell"></th>
        <th class="thumb-cell">Thumb</th>
        <th>Title</th>
        <th>Slug</th>
        <th>Category</th>
        <th class="chk">Visible</th>
        <th class="chk">Highlight</th>
        <th class="chk">Resume</th>
        <th class="chk" title="Portfolio hub tile on /menu for this category">Section cover</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <script>
    const CATEGORIES = ["academic", "professional", "code", "speaking"];
    const SAVE_DEBOUNCE_MS = 400;
    let registry = { version: 1, sectionOrder: {}, projects: {} };
    let dragSlug = null;
    let saveTimer = null;
    let saving = false;
    let pendingSave = false;
    let loaded = false;

    function setStatus(msg, state) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = state || "";
    }

    function canReorder() {
      const cat = document.getElementById("catFilter").value;
      const q = document.getElementById("filter").value.trim();
      return Boolean(cat && !q);
    }

    function ensureSectionOrder() {
      registry.sectionOrder = registry.sectionOrder || {};
      for (const c of CATEGORIES) {
        if (!Array.isArray(registry.sectionOrder[c])) registry.sectionOrder[c] = [];
      }
    }

    function slugsInCategory(cat) {
      return projectList()
        .filter(p => (p.category || "academic") === cat)
        .map(p => p.slug);
    }

    function syncCategoryOrder(cat) {
      ensureSectionOrder();
      const slugs = slugsInCategory(cat);
      const current = registry.sectionOrder[cat] || [];
      const merged = current.filter(s => slugs.includes(s));
      for (const s of slugs) {
        if (!merged.includes(s)) merged.push(s);
      }
      registry.sectionOrder[cat] = merged;
      return merged;
    }

    function sortIndex(p) {
      const cat = p.category || "academic";
      const order = syncCategoryOrder(cat);
      const idx = order.indexOf(p.slug);
      return idx === -1 ? 9999 : idx;
    }

    function scheduleSave() {
      if (!loaded) return;
      clearTimeout(saveTimer);
      setStatus("Unsaved changes...", "saving");
      saveTimer = setTimeout(() => saveRegistry(), SAVE_DEBOUNCE_MS);
    }

    async function loadRegistry() {
      loaded = false;
      clearTimeout(saveTimer);
      setStatus("Loading...", "saving");
      const res = await fetch("/api/projects");
      if (!res.ok) throw new Error("GET /api/projects failed: " + res.status);
      registry = await res.json();
      ensureSectionOrder();
      for (const c of CATEGORIES) syncCategoryOrder(c);
      render();
      loaded = true;
      setStatus("Loaded " + Object.keys(registry.projects || {}).length + " projects. Auto-save on.", "saved");
    }

    function projectList() {
      return Object.entries(registry.projects || {}).map(([slug, meta]) => ({ slug, ...meta }));
    }

    function thumbCell(p) {
      const src = p.thumbnail || "";
      if (!src) return '<td class="thumb-cell"><span class="thumb-missing"></span></td>';
      const href = projectHref(p);
      return '<td class="thumb-cell"><a class="thumb-link" href="' + esc(href) + '" target="_blank" rel="noopener">'
        + '<img class="thumb" src="' + esc(src) + '" alt="" loading="lazy" decoding="async" /></a></td>';
    }

    function projectHref(p) {
      const slug = p.slug;
      const cat = p.category || "academic";
      if (cat === "code") return "/code/" + slug;
      if (cat === "speaking") return "/speaking/" + slug;
      return "/" + slug;
    }

    function moveSlug(cat, fromSlug, beforeSlug) {
      syncCategoryOrder(cat);
      const order = registry.sectionOrder[cat].slice();
      const fromIdx = order.indexOf(fromSlug);
      if (fromIdx < 0) return;
      order.splice(fromIdx, 1);
      let toIdx = beforeSlug ? order.indexOf(beforeSlug) : order.length;
      if (toIdx < 0) toIdx = order.length;
      order.splice(toIdx, 0, fromSlug);
      registry.sectionOrder[cat] = order;
    }

    function bindDragRow(tr, p) {
      const reorder = canReorder();
      const handle = tr.querySelector(".drag-handle");
      if (!reorder) {
        tr.draggable = false;
        if (handle) handle.classList.add("disabled");
        return;
      }
      if (handle) handle.classList.remove("disabled");
      tr.draggable = true;
      tr.dataset.slug = p.slug;
      tr.dataset.category = p.category || "academic";

      tr.addEventListener("dragstart", e => {
        dragSlug = p.slug;
        tr.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", p.slug);
      });
      tr.addEventListener("dragend", () => {
        dragSlug = null;
        tr.classList.remove("dragging");
        document.querySelectorAll("tr.drag-over").forEach(r => r.classList.remove("drag-over"));
      });
      tr.addEventListener("dragover", e => {
        if (!dragSlug || dragSlug === p.slug) return;
        if ((p.category || "academic") !== (registry.projects[dragSlug]?.category || "academic")) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        tr.classList.add("drag-over");
      });
      tr.addEventListener("dragleave", () => tr.classList.remove("drag-over"));
      tr.addEventListener("drop", e => {
        e.preventDefault();
        tr.classList.remove("drag-over");
        if (!dragSlug || dragSlug === p.slug) return;
        const cat = p.category || "academic";
        moveSlug(cat, dragSlug, p.slug);
        dragSlug = null;
        render();
        scheduleSave();
      });
    }

    function sectionCoverSlug(cat) {
      for (const p of projectList()) {
        if ((p.category || "academic") === cat && p.sectionCover) return p.slug;
      }
      return null;
    }

    function setSectionCover(slug, checked) {
      if (!registry.projects[slug]) registry.projects[slug] = { slug };
      const cat = registry.projects[slug].category || "academic";
      if (checked) {
        for (const [s, meta] of Object.entries(registry.projects)) {
          if ((meta.category || "academic") === cat && meta.sectionCover) {
            meta.sectionCover = false;
          }
        }
        registry.projects[slug].sectionCover = true;
      } else {
        registry.projects[slug].sectionCover = false;
      }
    }

    function render() {
      const q = document.getElementById("filter").value.trim().toLowerCase();
      const cat = document.getElementById("catFilter").value;
      const tbody = document.getElementById("rows");
      const hint = document.getElementById("dragHint");
      tbody.innerHTML = "";
      hint.textContent = canReorder()
        ? "Drag rows to set masonry order for " + cat + "."
        : "Select a category (and clear search) to drag-sort rows.";

      const items = projectList().sort((a, b) => {
        const ca = a.category || "", cb = b.category || "";
        if (ca !== cb) return ca.localeCompare(cb);
        return sortIndex(a) - sortIndex(b) || (a.title || a.slug).localeCompare(b.title || b.slug);
      });

      for (const p of items) {
        if (cat && p.category !== cat) continue;
        const hay = (p.title + " " + p.slug).toLowerCase();
        if (q && !hay.includes(q)) continue;
        const tr = document.createElement("tr");
        if (p.visible === false) tr.className = "hidden-row";
        const handleClass = canReorder() ? "drag-handle" : "drag-handle disabled";
        const isSectionCover = Boolean(p.sectionCover);
        const coverTitle = isSectionCover ? "Current section cover on /menu" : "Set as section cover on /menu";
        tr.innerHTML = `
          <td class="drag-cell"><span class="${handleClass}" title="Drag to reorder">&#8942;&#8942;</span></td>
          ${thumbCell(p)}
          <td>${esc(p.title || p.slug)}</td>
          <td class="slug">${esc(p.slug)}</td>
          <td><select data-slug="${esc(p.slug)}" data-field="category">${catOptions(p.category)}</select></td>
          <td class="chk"><input type="checkbox" data-slug="${esc(p.slug)}" data-field="visible" ${p.visible !== false ? "checked" : ""} /></td>
          <td class="chk"><input type="checkbox" data-slug="${esc(p.slug)}" data-field="highlight" ${p.highlight ? "checked" : ""} /></td>
          <td class="chk"><input type="checkbox" data-slug="${esc(p.slug)}" data-field="includeInResume" ${p.includeInResume ? "checked" : ""} /></td>
          <td class="chk"><input type="checkbox" data-slug="${esc(p.slug)}" data-field="sectionCover" title="${esc(coverTitle)}" ${isSectionCover ? "checked" : ""} /></td>`;
        tbody.appendChild(tr);
        bindDragRow(tr, p);
      }
      tbody.querySelectorAll("select, input").forEach(el => {
        el.addEventListener("change", onFieldChange);
      });
    }

    function catOptions(selected) {
      return CATEGORIES.map(c => `<option value="${c}" ${c === selected ? "selected" : ""}>${c}</option>`).join("");
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
    }

    function onFieldChange(e) {
      const el = e.target;
      const slug = el.dataset.slug;
      const field = el.dataset.field;
      if (!registry.projects[slug]) registry.projects[slug] = { slug };
      if (field === "category") {
        const oldCat = registry.projects[slug].category || "academic";
        const newCat = el.value;
        const wasCover = registry.projects[slug].sectionCover;
        registry.projects[slug][field] = newCat;
        if (wasCover) {
          registry.projects[slug].sectionCover = false;
          if (!sectionCoverSlug(newCat)) {
            registry.projects[slug].sectionCover = true;
          }
        }
        ensureSectionOrder();
        registry.sectionOrder[oldCat] = (registry.sectionOrder[oldCat] || []).filter(s => s !== slug);
        syncCategoryOrder(newCat);
        if (!registry.sectionOrder[newCat].includes(slug)) {
          registry.sectionOrder[newCat].push(slug);
        }
      } else if (field === "visible" || field === "highlight" || field === "includeInResume") {
        registry.projects[slug][field] = el.checked;
      } else if (field === "sectionCover") {
        setSectionCover(slug, el.checked);
      } else {
        registry.projects[slug][field] = el.value;
      }
      render();
      scheduleSave();
    }

    async function saveRegistry() {
      if (saving) {
        pendingSave = true;
        return;
      }
      saving = true;
      setStatus("Saving...", "saving");
      try {
        for (const c of CATEGORIES) syncCategoryOrder(c);
        const res = await fetch("/api/projects", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(registry),
        });
        if (!res.ok) throw new Error("POST failed: " + res.status);
        const data = await res.json();
        const rebuilt = (data.rebuilt || []).length;
        setStatus(
          rebuilt
            ? "Saved and rebuilt " + rebuilt + " script(s). Refresh section pages to preview."
            : "Saved.",
          "saved"
        );
      } catch (err) {
        setStatus(err.message, "error");
      } finally {
        saving = false;
        if (pendingSave) {
          pendingSave = false;
          scheduleSave();
        }
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", () => loadRegistry().catch(e => setStatus(e.message, "error")));
    document.getElementById("filter").addEventListener("input", render);
    document.getElementById("catFilter").addEventListener("change", render);
    loadRegistry().catch(e => setStatus(e.message + " - start scripts/serve.py for API.", "error"));
  </script>
</body>
</html>
